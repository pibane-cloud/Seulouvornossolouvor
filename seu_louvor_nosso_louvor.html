<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Seu Louvor, Nosso Louvor</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      width:100%;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#ffffff;
      font-family:Arial, sans-serif;
      padding:20px;
    }

    .container{
      text-align:center;
      width:100%;
      max-width:700px;
    }

    .logo{
      width:100%;
      max-width:650px;
      margin-bottom:40px;
    }

    .btn-sortear{
      background:#0b1f4d;
      color:#fff;
      border:none;
      padding:18px 40px;
      border-radius:50px;
      font-size:20px;
      font-weight:bold;
      cursor:pointer;
      transition:0.3s;
    }

    .btn-sortear:hover{
      opacity:0.9;
      transform:scale(1.02);
    }

    .resultado{
      margin-top:30px;
      font-size:22px;
      color:#0b1f4d;
      font-weight:bold;
    }
  </style>
</head>

<body>

  <div class="container">

    <img 
      src="assets/logo.jpg" 
      alt="Seu Louvor Nosso Louvor"
      class="logo"
    >

    <button class="btn-sortear" onclick="realizarSorteio()">
      🎵 Sortear o próximo louvor
    </button>

    <div class="resultado" id="resultado"></div>

  </div>

<script>
async function realizarSorteio(){

  const webAppUrl = localStorage.getItem('slnl_webapp_url');

  if(!webAppUrl){
    alert('Configure primeiro a URL do Apps Script.');
    return;
  }

  try{

    const response = await fetch(webAppUrl + '?acao=sortear');

    const data = await response.json();

    if(data.erro){
      alert(data.erro);
      return;
    }

    document.getElementById('resultado').innerHTML = `
      ${data.nome} <br><br>
      🎵 ${data.musica}
    `;

  }catch(err){
    alert('Erro ao realizar sorteio.');
    console.error(err);
  }
}
</script>

</body>
</html>
